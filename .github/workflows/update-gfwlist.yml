name: Update Autoproxy

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 时间 00:00 执行
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: update-autoproxy
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Merge GFWlist and publish
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python merge-gfwlist.py
          if git diff --quiet -- autoproxy.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git add autoproxy.txt
            git commit -m "Update autoproxy.txt"
            git push origin HEAD:main
          fi

      - name: Create release
        if: steps.merge.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: autoproxy.txt
          tag_name: v${{ github.run_number }}
          target_commitish: main
          name: Autoproxy Release v${{ github.run_number }}
          body: Automated release for updated autoproxy.txt.
